<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Canvas</title>
  <style>
    :root {
      --bg: #111111;
      --text: #ffffff;
      --muted: #cfcfcf;
      --panel: #1a1a1a;
      --border: rgba(255,255,255,0.12);
      --max-width: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(100%, var(--max-width));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: center;
    }

    .text-box {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 5vw, 4.5rem);
      line-height: 1;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 34rem;
    }

    .media-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-box img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 820px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .media-box {
        min-height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="text-box">
      
      <h1>Greetings from PokeHEXER 0x15!!!</h1>
      <p>
        I choose you
      </p>
    </section>

    <section class="media-box">
      <img src="mew.jpeg" alt="Mew" />
    </section>
  </main>
</body>
</html>
